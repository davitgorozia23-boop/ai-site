<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Clone</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #fff;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 15px 20px;
      gap: 15px;
    }

    .navbar a {
      text-decoration: none;
      color: #202124;
      font-size: 14px;
    }

    .navbar a:hover {
      text-decoration: underline;
    }

    .signin-btn {
      background: #1a73e8;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
    }

    .signin-btn:hover {
      background: #1669c1;
    }

    /* MAIN */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .logo {
      font-size: 70px;
      margin-bottom: 25px;
    }

    .logo span:nth-child(1) { color: #4285F4; }
    .logo span:nth-child(2) { color: #EA4335; }
    .logo span:nth-child(3) { color: #FBBC05; }
    .logo span:nth-child(4) { color: #4285F4; }
    .logo span:nth-child(5) { color: #34A853; }
    .logo span:nth-child(6) { color: #EA4335; }

    .search-box {
      width: 100%;
      max-width: 580px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 14px 50px;
      border-radius: 30px;
      border: 1px solid #dfe1e5;
      font-size: 16px;
      outline: none;
    }

    .search-box input:hover {
      box-shadow: 0 1px 6px rgba(32,33,36,.28);
      border-color: transparent;
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #9aa0a6;
    }

    .icons-right {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 15px;
      color: #5f6368;
    }

    .buttons {
      margin-top: 25px;
    }

    .buttons button {
      padding: 10px 18px;
      margin: 5px;
      border: 1px solid #f8f9fa;
      background: #f8f9fa;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .buttons button:hover {
      border: 1px solid #dadce0;
    }

    .lang {
      margin-top: 20px;
      font-size: 14px;
    }

    .lang a {
      color: #1a0dab;
      text-decoration: none;
    }

    /* FOOTER */
    .footer {
      background: #f2f2f2;
      font-size: 14px;
    }

    .footer-top {
      padding: 15px 30px;
      border-bottom: 1px solid #dadce0;
      color: #70757a;
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      flex-wrap: wrap;
    }

    .footer-bottom a {
      margin-right: 15px;
      text-decoration: none;
      color: #70757a;
    }

    .footer-bottom a:hover {
      text-decoration: underline;
    }

    /* 📱 MOBILE RESPONSIVE */
    @media (max-width: 600px) {

      .navbar {
        padding: 10px 15px;
      }

      .navbar a {
        font-size: 13px;
      }

      .signin-btn {
        padding: 6px 12px;
        font-size: 13px;
      }

      .main {
        justify-content: flex-start;
        margin-top: 80px;
      }

      .logo {
        font-size: 42px;
        margin-bottom: 20px;
      }

      .search-box {
        max-width: 90%;
      }

      .search-box input {
        padding: 12px 45px;
        font-size: 15px;
      }

      .icons-right {
        gap: 10px;
      }

      .buttons button {
        padding: 8px 14px;
        font-size: 13px;
      }

      .lang {
        font-size: 13px;
        text-align: center;
        padding: 0 10px;
      }

      .footer-top {
        font-size: 13px;
        padding: 12px 15px;
      }

      .footer-bottom {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 10px;
      }

      .footer-bottom div {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
      }

      .footer-bottom a {
        margin: 5px 10px;
        font-size: 13px;
      }
    }

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <a href="#">Gmail</a>
    <a href="#">Images</a>
    <i class="fa fa-th"></i>
    <button class="signin-btn">Sign in</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="logo">
      <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </div>

    <div class="search-box">
      <i class="fa fa-search search-icon"></i>
      <input type="text">
      <div class="icons-right">
        <i class="fa fa-microphone"></i>
        <i class="fa fa-camera"></i>
      </div>
    </div>

    <div class="buttons">
      <button>Google Search</button>
      <button>I'm Feeling Lucky</button>
    </div>

    <div class="lang">
      Google offered in: <a href="#">Georgian</a>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-top">
      Georgia
    </div>
    <div class="footer-bottom">
      <div>
        <a href="#">About</a>
        <a href="#">Advertising</a>
        <a href="#">Business</a>
        <a href="#">How Search works</a>
      </div>
      <div>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Settings</a>
      </div>
    </div>
  </div>

</body>
</html>
